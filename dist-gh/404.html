    <!-- Apply persisted theme before first paint (default: dark) -->
    <script>
      (function () {
        var dark = true;
        try {
          var saved = localStorage.getItem('wc26-theme');
          if (saved === 'light') dark = false;
        } catch (e) {}
        document.documentElement.classList.toggle('dark', dark);
        var cs = document.getElementById('meta-color-scheme');
        if (cs) cs.setAttribute('content', dark ? 'dark light' : 'light dark');
        var tc = document.getElementById('meta-theme-color');
        if (tc) tc.setAttribute('content', dark ? '#0B0E0C' : '#F6F5F0');
      })();
    </script>
